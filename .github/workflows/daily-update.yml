# GitHub Actions Workflow - Daily Tariff Update
# This runs automatically every day at 6:00 AM Eastern Time

name: Daily Tariff Update

# When to run this workflow
on:
  # Run every day at 10:00 UTC (6:00 AM Eastern)
  schedule:
    - cron: '0 10 * * *'
  
  # Also allow manual runs from GitHub Actions tab
  workflow_dispatch:

# What to do when the workflow runs
jobs:
  update-site:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Get the code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      # Step 3: Install required libraries
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      # Step 4: Fetch RSS feeds
      - name: Fetch tariff news
        run: |
          python fetch_feeds.py
      
      # Step 5: Analyze with Claude AI
      - name: Analyze articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python analyze_tariffs.py
      
      # Step 6: Generate website
      - name: Generate site
        run: |
          python generate_site.py
      
      # Step 7: Commit and push changes
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily tariff update - $(date +'%Y-%m-%d')"
          git push
